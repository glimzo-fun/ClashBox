vanilla-extensions:
  enabled: true
  extra-levels: 3
  cost-per-extra-level-multiplier: 3.0
  enchants:
    DAMAGE_ALL:
      base-name: "Sharpness"
      vanilla-max: 5
      extended-max: 8
      cost-per-level: [500, 1200, 2800, 6000, 12000, 22000, 35000, 55000]
      tier-required: [1, 1, 2, 3, 4, 6, 8, 10]
    PROTECTION_ENVIRONMENTAL:
      base-name: "Protection"
      vanilla-max: 4
      extended-max: 7
      cost-per-level: [600, 1400, 3000, 6500, 13000, 24000, 40000]
      tier-required: [1, 1, 2, 3, 5, 7, 10]
    DURABILITY:
      base-name: "Unbreaking"
      vanilla-max: 3
      extended-max: 6
      cost-per-level: [400, 1000, 2200, 5000, 10000, 20000]
      tier-required: [1, 1, 2, 4, 6, 9]
    DIG_SPEED:
      base-name: "Efficiency"
      vanilla-max: 5
      extended-max: 8
      cost-per-level: [450, 1000, 2400, 5500, 11000, 20000, 32000, 50000]
      tier-required: [1, 1, 2, 3, 4, 6, 8, 10]
    KNOCKBACK:
      base-name: "Knockback"
      vanilla-max: 2
      extended-max: 5
      cost-per-level: [700, 1800, 4000, 9000, 18000]
      tier-required: [1, 2, 4, 6, 9]
    FIRE_ASPECT:
      base-name: "Fire Aspect"
      vanilla-max: 2
      extended-max: 4
      cost-per-level: [800, 2000, 5000, 12000]
      tier-required: [2, 3, 6, 9]
    LOOT_BONUS_MOBS:
      base-name: "Looting"
      vanilla-max: 3
      extended-max: 5
      cost-per-level: [1000, 2500, 6000, 13000, 25000]
      tier-required: [2, 3, 5, 7, 10]
    THORNS:
      base-name: "Thorns"
      vanilla-max: 3
      extended-max: 5
      cost-per-level: [1200, 3000, 7000, 15000, 28000]
      tier-required: [3, 4, 6, 8, 11]
    FEATHER_FALLING:
      base-name: "Feather Falling"
      vanilla-max: 4
      extended-max: 6
      cost-per-level: [500, 1200, 2800, 6000, 12000, 22000]
      tier-required: [1, 2, 3, 5, 7, 9]

custom-enchants:
  REBOUND:
    name: "Rebound"
    applicable: [CHESTPLATE]
    max-level: 3
    tier-required: [3, 5, 8]
    cost: [3000, 8000, 20000]
    reflect-percent: [0.10, 0.20, 0.35]
    description: "Reflects {val}% of damage taken back at attacker."

  BLOODTHIRST:
    name: "Bloodthirst"
    applicable: [SWORD]
    max-level: 3
    tier-required: [5, 7, 10]
    cost: [4000, 10000, 25000]
    heal-percent: [0.06, 0.12, 0.20]
    description: "Heals {val}% of victim's remaining HP on kill."

  EXECUTE:
    name: "Execute"
    applicable: [SWORD]
    max-level: 3
    tier-required: [5, 7, 9]
    cost: [3500, 9000, 22000]
    threshold-hp-percent: 0.30
    bonus-damage-percent: [0.20, 0.40, 0.65]
    description: "+{val}% damage when target is below 30% HP."

  BERSERKER:
    name: "Berserker"
    applicable: [SWORD]
    max-level: 3
    tier-required: [8, 10, 13]
    cost: [5000, 12000, 28000]
    damage-per-hit-stack: [0.05, 0.10, 0.18]
    max-stacks: 8
    description: "Each consecutive hit deals +{val}% more damage (max 8 stacks, resets on switch)."

  NEMESIS:
    name: "Nemesis"
    applicable: [SWORD]
    max-level: 3
    tier-required: [10, 13, 16]
    cost: [6000, 15000, 35000]
    bonus-damage-percent: [0.15, 0.28, 0.45]
    description: "+{val}% damage vs players who killed you this session."

  MAGNETISM:
    name: "Magnetism"
    applicable: [PICKAXE]
    max-level: 3
    tier-required: [3, 5, 7]
    cost: [2000, 5500, 13000]
    description: "Mined ores are auto-collected — no item drop."

  FORTUNE:
    name: "Fortune"
    applicable: [PICKAXE]
    max-level: 3
    tier-required: [6, 8, 11]
    cost: [5000, 12000, 28000]
    double-chance: [0.20, 0.35, 0.50]
    description: "{val}% chance to double shard yield from one ore."

  VEIN_SENSE:
    name: "Vein Sense"
    applicable: [PICKAXE]
    max-level: 3
    tier-required: [4, 6, 9]
    cost: [2500, 6500, 16000]
    scan-radius: [12, 20, 30]
    description: "Particles trail toward nearest ore node within {val} blocks."

  EXCAVATOR:
    name: "Excavator"
    applicable: [PICKAXE]
    max-level: 3
    tier-required: [7, 9, 12]
    cost: [4000, 10000, 24000]
    value-increase-per-ore: [0.02, 0.04, 0.07]
    cap-multiplier: 2.0
    description: "Each ore mined this session increases next ore value by {val}% (cap 2x, resets on death)."

  ADRENALINE:
    name: "Adrenaline"
    applicable: [BOOTS]
    max-level: 3
    tier-required: [3, 5, 8]
    cost: [2800, 7000, 17000]
    speed-amplifier: [0, 1, 2]
    duration-ticks: [40, 50, 60]
    cooldown-ticks: [200, 160, 120]
    description: "Speed burst for {val}t when taking damage ({cd}t cooldown)."

  LAST_STAND:
    name: "Last Stand"
    applicable: [CHESTPLATE, LEGGINGS]
    max-level: 3
    tier-required: [5, 7, 10]
    cost: [4000, 10000, 24000]
    hp-threshold-percent: 0.20
    resistance-amplifier: [0, 1, 2]
    description: "Resistance {val} when below 20% HP."

  PHANTOM:
    name: "Phantom"
    applicable: [HELMET]
    max-level: 3
    tier-required: [10, 13, 16]
    cost: [7000, 18000, 40000]
    invisible-ticks: [20, 30, 40]
    cooldown-seconds: [120, 90, 60]
    description: "{val}t invisibility on near-death hit ({cd}s cooldown)."

  CORE_FORGED:
    name: "Core Forged"
    applicable: [SWORD]
    max-level: 3
    tier-required: [6, 9, 12]
    cost: [5000, 13000, 30000]
    bonus-damage-percent: [0.12, 0.22, 0.35]
    description: "+{val}% damage dealt inside Core Zone only."

  OUTER_SHELL:
    name: "Outer Shell"
    applicable: [HELMET]
    max-level: 3
    tier-required: [4, 6, 9]
    cost: [3000, 8000, 19000]
    damage-reduction-percent: [0.10, 0.18, 0.28]
    description: "-{val}% damage taken inside Outer Zone only."
